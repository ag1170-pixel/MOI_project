<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block page_title %}{{ page_title }}{% endblock %}</title>
  <meta name="description" content="{% block meta_desc %}Maps of India — Your complete guide to India's geography, maps and culture.{% endblock %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --moi-blue: #1a3c6e;
      --moi-gold: #ffd700;
      --moi-light: #f4f6fb;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--moi-light); color: #222; }

    /* Header */
    .site-header { background: var(--moi-blue); padding: .75rem 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .site-header .brand { font-size: 1.35rem; font-weight: 700; color: #fff; text-decoration: none; display: flex; align-items: center; gap: .5rem; }
    .site-header .brand .dot { color: var(--moi-gold); font-size: 1.1rem; }

    /* Nav tabs */
    .site-nav a {
      color: rgba(255,255,255,.75);
      text-decoration: none;
      padding: .4rem .85rem;
      border-radius: 20px;
      font-size: .9rem;
      font-weight: 500;
      transition: all .15s;
    }
    .site-nav a:hover { color: #fff; background: rgba(255,255,255,.12); }
    .site-nav a.active { color: var(--moi-blue); background: var(--moi-gold); font-weight: 700; }

    /* Hero banner */
    .hero-banner { background: linear-gradient(135deg, var(--moi-blue) 0%, #2563a8 100%); color: #fff; padding: 3.5rem 0 3rem; }
    .hero-banner h1 { font-size: clamp(1.6rem, 4vw, 2.6rem); font-weight: 800; }
    .hero-banner p { opacity: .85; font-size: 1.05rem; }

    /* Article cards */
    .article-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.07); transition: transform .2s, box-shadow .2s; height: 100%; display: flex; flex-direction: column; }
    .article-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.13); }
    .article-card .card-img { width: 100%; height: 190px; object-fit: cover; }
    .article-card .card-img-placeholder { width: 100%; height: 190px; background: linear-gradient(135deg, #1a3c6e22, #2563a822); display: flex; align-items: center; justify-content: center; color: #1a3c6e55; font-size: 3rem; }
    .article-card .card-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; }
    .article-card .card-title { font-size: 1rem; font-weight: 700; margin-bottom: .5rem; color: #111; line-height: 1.4; }
    .article-card .card-text { font-size: .875rem; color: #555; flex: 1; }
    .article-card .card-footer-meta { font-size: .75rem; color: #888; margin-top: .75rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .25rem; }
    .article-card .read-more { color: var(--moi-blue); font-size: .82rem; font-weight: 600; text-decoration: none; }
    .article-card .read-more:hover { color: #2563a8; text-decoration: underline; }

    /* Category badge */
    .cat-badge { font-size: .7rem; font-weight: 700; padding: .25rem .6rem; border-radius: 20px; text-transform: uppercase; letter-spacing: .04em; }
    .cat-general { background: #e9ecef; color: #495057; }
    .cat-maps { background: #dbeafe; color: #1e40af; }
    .cat-my_india { background: #fef3c7; color: #92400e; }

    /* Section titles */
    .section-title { font-size: 1.4rem; font-weight: 800; color: var(--moi-blue); border-left: 4px solid var(--moi-gold); padding-left: .75rem; }

    /* Pagination */
    .pagination .page-link { color: var(--moi-blue); border-radius: 8px !important; margin: 0 2px; }
    .pagination .page-item.active .page-link { background: var(--moi-blue); border-color: var(--moi-blue); }

    /* Empty state */
    .empty-state { background: #fff; border-radius: 12px; padding: 4rem 2rem; text-align: center; }

    /* Footer */
    .site-footer { background: var(--moi-blue); color: rgba(255,255,255,.7); margin-top: 5rem; padding: 2.5rem 0; font-size: .875rem; }
    .site-footer a { color: rgba(255,255,255,.6); text-decoration: none; }
    .site-footer a:hover { color: var(--moi-gold); }
    .site-footer .footer-brand { color: #fff; font-weight: 700; font-size: 1.1rem; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ===== HEADER — Replace with Raj's layout ===== -->
<header class="site-header">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between">
      <a href="/" class="brand">
        <span class="dot">&#9679;</span> Maps of India
      </a>
      <nav class="site-nav d-flex gap-1 align-items-center">
        <a href="/" class="{% block nav_home %}{% endblock %}">
          <i class="bi bi-house-fill me-1 d-none d-md-inline"></i>Home
        </a>
        <a href="/maps" class="{% block nav_maps %}{% endblock %}">
          <i class="bi bi-map-fill me-1 d-none d-md-inline"></i>Maps
        </a>
        <a href="/my-india" class="{% block nav_my_india %}{% endblock %}">
          <i class="bi bi-india me-1 d-none d-md-inline"></i>My India
        </a>
      </nav>
    </div>
  </div>
</header>
<!-- ===== END HEADER ===== -->

{% block body %}{% endblock %}

<!-- ===== FOOTER — Replace with Raj's layout ===== -->
<footer class="site-footer">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-5 mb-3 mb-md-0">
        <div class="footer-brand mb-1">&#9679; Maps of India</div>
        <p class="mb-0">Your complete guide to India's maps, geography and travel.</p>
      </div>
      <div class="col-md-4 mb-3 mb-md-0">
        <div class="d-flex flex-column gap-1">
          <a href="/">Home</a>
          <a href="/maps">Maps</a>
          <a href="/my-india">My India</a>
        </div>
      </div>
      <div class="col-md-3 text-md-end">
        <p class="mb-1">&copy; {% now "Y" %} Maps of India</p>
        <a href="/sitemap.xml" class="small"><i class="bi bi-diagram-3 me-1"></i>Sitemap</a>
      </div>
    </div>
  </div>
</footer>
<!-- ===== END FOOTER ===== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
