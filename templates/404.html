{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height:60vh;text-align:center;">
  <div style="font-size:4rem;color:#F97316;" class="mb-3"><i class="bi bi-question-circle-fill"></i></div>
  <h2 class="fw-bold mb-2" style="color:#111827;">Page Not Found</h2>
  <p class="text-muted mb-4" style="max-width:420px;">
    The page you're looking for doesn't exist or may have been moved.
  </p>
  <div class="d-flex gap-3">
    <a href="/dashboard/" class="btn fw-semibold"
       style="background:var(--moi-blue);color:#fff;border-radius:10px;padding:.5rem 1.4rem;">
      <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
    </a>
    <a href="/" class="btn fw-semibold btn-outline-secondary" style="border-radius:10px;padding:.5rem 1.4rem;">
      Public Site
    </a>
  </div>
</div>
{% endblock %}
