<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Maps of India{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; color: #222; }
    .site-header { background: #1a3c6e; color: #fff; padding: 1rem 0; }
    .site-header .brand { font-size: 1.5rem; font-weight: 700; color: #fff; text-decoration: none; }
    .site-header .brand:hover { color: #fff; }
    .site-header nav a { color: #ccc; text-decoration: none; }
    .site-header nav a:hover { color: #fff; }
    .site-footer { background: #1a3c6e; color: #ccc; padding: 2rem 0; margin-top: 4rem; font-size: .875rem; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <a href="/" class="brand">
          <span style="color:#ffd700;">&#9679;</span> Maps of India
        </a>
        <nav class="d-none d-md-flex gap-4">
          <a href="/">Home</a>
          <a href="/maps">Maps</a>
          <a href="/my-india">My India</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <p class="mb-1 fw-semibold text-white">Maps of India</p>
          <p class="mb-0">Your complete guide to India's maps, geography and travel.</p>
        </div>
        <div class="col-md-6 text-md-end mt-3 mt-md-0">
          <p class="mb-0">&copy; {% now "Y" %} Maps of India. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
